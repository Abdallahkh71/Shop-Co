<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Wishlist</title>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <style>
      .navbar-brand img {
        max-width: 150px;
        width: 100%;
      }
    </style>
  </head>
  <body class="bg-light">
    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Toast -->
    <div
      class="toast-container position-fixed top-0 end-0 p-3"
      style="z-index: 9999"
    >
      <div
        id="liveToast"
        class="toast align-items-center text-bg-success border-0"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body d-flex align-items-center gap-2">
            <i id="toastIcon" class="bi bi-check-circle-fill fs-5"></i>
            <span id="toastMessage">Done!</span>
          </div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
            aria-label="Close"
          ></button>
        </div>
      </div>
    </div>

    <main class="container py-5">
      <!-- Page Header -->
      <div class="d-flex align-items-center gap-3 my-4 flex-wrap">
        <a href="home.html" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-arrow-left me-1"></i>Back
        </a>
        <div>
          <h4 class="fw-bold mb-0">
            <i class="bi bi-heart-fill text-danger me-2"></i>My Wishlist
          </h4>
          <p class="text-muted small mb-0" id="itemCountLabel">Loading...</p>
        </div>
      </div>

      <!-- Skeleton Loader -->
      <div
        id="skeletonLoader"
        class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"
      >
        <script src="/components/navbar.js"></script>
        <script>
          document.write(
            Array(8)
              .fill(0)
              .map(
                () => `
              <div class="col">
                <div class="card h-100 border-0 shadow-sm">
                  <div class="placeholder-glow">
                    <div class="placeholder bg-secondary" style="height:220px;width:100%;border-radius:.375rem .375rem 0 0;"></div>
                  </div>
                  <div class="card-body placeholder-glow">
                    <h6 class="placeholder col-8 bg-secondary"></h6>
                    <p class="placeholder col-5 bg-secondary"></p>
                    <p class="placeholder col-4 bg-secondary"></p>
                  </div>
                  <div class="card-footer border-0 bg-transparent placeholder-glow d-flex flex-column gap-2 pb-3">
                    <div class="placeholder col-12 bg-secondary" style="height:34px;border-radius:.375rem;"></div>
                    <div class="placeholder col-12 bg-danger" style="height:34px;border-radius:.375rem;"></div>
                  </div>
                </div>
              </div>
            `,
              )
              .join(""),
          );
        </script>
      </div>

      <!-- Empty State -->
      <div id="emptyWishlist" class="text-center py-5 d-none">
        <i class="bi bi-heart display-2 text-muted"></i>
        <h5 class="mt-3 fw-semibold text-muted">Your wishlist is empty</h5>
        <p class="text-muted small">
          Save items you love and come back to them anytime.
        </p>
        <a href="products.html" class="btn btn-danger mt-2">
          <i class="bi bi-bag-heart me-2"></i>Browse Products
        </a>
      </div>

      <!-- Error -->
      <div
        id="errorAlert"
        class="alert alert-danger d-none text-center"
        role="alert"
      >
        <i class="bi bi-exclamation-triangle-fill me-2"></i>Failed to load your
        wishlist.
        <button
          class="btn btn-sm btn-outline-danger ms-2"
          onclick="fetchWishlist()"
        >
          Retry
        </button>
      </div>

      <!-- Wishlist Grid -->
      <div
        id="wishlistGrid"
        class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 d-none"
      ></div>
    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <script>
      const API_BASE = "https://ecommerce.routemisr.com/api/v1";
      const token = () => localStorage.getItem("token") || "";

      //  Toast
      function showToast(message, type = "success") {
        const toastEl = document.getElementById("liveToast");
        const toastMsg = document.getElementById("toastMessage");
        const toastIcon = document.getElementById("toastIcon");
        toastEl.className = "toast align-items-center border-0";
        const map = {
          success: ["text-bg-success", "bi bi-check-circle-fill fs-5"],
          danger: ["text-bg-danger", "bi bi-x-circle-fill fs-5"],
          warning: ["text-bg-warning", "bi bi-exclamation-circle-fill fs-5"],
          info: ["text-bg-info", "bi bi-info-circle-fill fs-5"],
        };
        const [cls, icon] = map[type] || map.info;
        toastEl.classList.add(cls);
        toastIcon.className = icon;
        toastMsg.textContent = message;
        bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 3000 }).show();
      }

      //  Add to Cart
      async function addToCart(productId, btn) {
        btn.disabled = true;
        btn.innerHTML =
          '<span class="spinner-border spinner-border-sm me-1"></span>Adding...';
        try {
          const res = await fetch(`${API_BASE}/cart`, {
            method: "POST",
            headers: { "Content-Type": "application/json", token: token() },
            body: JSON.stringify({ productId }),
          });
          const data = await res.json();
          if (res.ok) {
            showToast("Product added to cart!", "success");
            if (typeof updateCartBadge === "function") updateCartBadge();
          } else {
            showToast(data.message || "Could not add to cart.", "danger");
          }
        } catch {
          showToast("Network error. Please try again.", "danger");
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-cart-plus me-1"></i>Add to Cart';
        }
      }

      //  Remove from Wishlist
      async function removeFromWishlist(productId, btn) {
        btn.disabled = true;
        btn.innerHTML =
          '<span class="spinner-border spinner-border-sm me-1"></span>Removing...';
        try {
          const res = await fetch(`${API_BASE}/wishlist/${productId}`, {
            method: "DELETE",
            headers: { token: token() },
          });
          const data = await res.json();

          if (res.ok) {
            showToast("Removed from wishlist.", "warning");
            if (typeof updateWishlistBadge === "function")
              updateWishlistBadge();

            // Animate card out
            const card = document.getElementById(`wish-${productId}`);
            if (card) {
              card.style.transition = "opacity .3s, transform .3s";
              card.style.opacity = "0";
              card.style.transform = "scale(.9)";
              setTimeout(() => {
                card.remove();
                updateCount();
              }, 320);
            }
          } else {
            showToast(data.message || "Could not remove item.", "danger");
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-heart-fill me-1"></i>Remove';
          }
        } catch {
          showToast("Network error. Please try again.", "danger");
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-heart-fill me-1"></i>Remove';
        }
      }

      //  Update count label after removal
      function updateCount() {
        const remaining =
          document.querySelectorAll("#wishlistGrid .col").length;
        document.getElementById("itemCountLabel").textContent = remaining
          ? `${remaining} item${remaining !== 1 ? "s" : ""} saved`
          : "";
        if (!remaining) {
          document.getElementById("wishlistGrid").classList.add("d-none");
          document.getElementById("emptyWishlist").classList.remove("d-none");
        }
      }

      //  Render Wishlist
      function renderWishlist(products) {
        document.getElementById("skeletonLoader").classList.add("d-none");
        document.getElementById("errorAlert").classList.add("d-none");

        if (!products.length) {
          document.getElementById("emptyWishlist").classList.remove("d-none");
          document.getElementById("itemCountLabel").textContent = "";
          return;
        }

        document.getElementById("itemCountLabel").textContent =
          `${products.length} item${products.length !== 1 ? "s" : ""} saved`;
        document.getElementById("wishlistGrid").classList.remove("d-none");

        const grid = document.getElementById("wishlistGrid");
        grid.innerHTML = "";

        products.forEach((product) => {
          const stars = Math.round(product.ratingsAverage || 0);
          const starsHtml = Array(5)
            .fill(0)
            .map(
              (_, i) =>
                `<i class="bi bi-star${i < stars ? "-fill" : ""} text-warning small"></i>`,
            )
            .join("");

          const col = document.createElement("div");
          col.className = "col";
          col.id = `wish-${product._id}`;
          col.innerHTML = `
                  <div class="card h-100 border-0 shadow-sm position-relative overflow-hidden">

                    <!-- Saved ribbon -->
                    <span class="badge bg-danger position-absolute top-0 start-0 m-2" style="z-index:2;">
                      <i class="bi bi-heart-fill me-1"></i>Saved
                    </span>

                    <!-- Sale badge -->
                    ${
                      product.priceAfterDiscount
                        ? `<span class="badge bg-warning text-dark position-absolute top-0 end-0 m-2" style="z-index:2;">Sale</span>`
                        : ""
                    }

                    <!-- Image -->
                    <div class="ratio ratio-4x3 bg-white">
                      <img
                        src="${product.imageCover}"
                        class="card-img-top object-fit-contain p-2"
                        alt="${product.title}"
                        loading="lazy"
                        onerror="this.src='https://placehold.co/300x300?text=No+Image'"
                      />
                    </div>

                    <!-- Body -->
                    <div class="card-body pb-1">
                      <span class="badge bg-primary bg-opacity-10 text-primary small mb-1">
                        ${product.category?.name || ""}
                      </span>
                      <h6 class="card-title fw-semibold lh-sm mb-1"
                          style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
                        ${product.title}
                      </h6>
                      <div class="d-flex align-items-center gap-1 mb-2">
                        ${starsHtml}
                        <span class="text-muted small ms-1">(${product.ratingsQuantity || 0})</span>
                      </div>
                      <div class="d-flex align-items-center gap-2">
                        <span class="fw-bold text-success fs-6">
                          ${product.priceAfterDiscount || product.price} EGP
                        </span>
                        ${
                          product.priceAfterDiscount
                            ? `<span class="text-decoration-line-through text-muted small">${product.price} EGP</span>`
                            : ""
                        }
                      </div>
                    </div>

                    <!-- Footer: two action buttons -->
                    <div class="card-footer bg-transparent border-0 pt-0 pb-3 px-3 d-flex flex-column gap-2">
                      <button
                        class="btn btn-dark btn-sm w-100"
                        onclick="addToCart('${product._id}', this)"
                      >
                        <i class="bi bi-cart-plus me-1"></i>Add to Cart
                      </button>
                      <button
                        class="btn btn-outline-danger btn-sm w-100"
                        onclick="removeFromWishlist('${product._id}', this)"
                      >
                        <i class="bi bi-heart-fill me-1"></i>Remove
                      </button>
                    </div>

                  </div>`;
          grid.appendChild(col);
        });
      }

      //  GET Wishlist
      async function fetchWishlist() {
        document.getElementById("skeletonLoader").classList.remove("d-none");
        document.getElementById("wishlistGrid").classList.add("d-none");
        document.getElementById("emptyWishlist").classList.add("d-none");
        document.getElementById("errorAlert").classList.add("d-none");
        document.getElementById("itemCountLabel").textContent = "Loading...";

        try {
          const res = await fetch(`${API_BASE}/wishlist`, {
            headers: { token: token() },
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);
          renderWishlist(data.data || []);
        } catch (err) {
          document.getElementById("skeletonLoader").classList.add("d-none");
          document.getElementById("errorAlert").classList.remove("d-none");
          document.getElementById("itemCountLabel").textContent = "";
          console.error(err);
        }
      }

      //  Load components
      function loadComponent(id, file, callback) {
        // ← add callback param
        fetch(file)
          .then((response) => response.text())
          .then((data) => {
            document.getElementById(id).innerHTML = data;
            if (typeof callback === "function") callback();
          });
      }

      loadComponent("navbar", "/components/navbar.html", initNavbar);
      loadComponent("footer", "/components/footer.html");

      //  Init
      fetchWishlist();
    </script>
  </body>
</html>
