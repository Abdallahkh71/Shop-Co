<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Categories</title>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <style>
      .navbar-brand img {
        max-width: 150px;
        width: 100%;
      }
    </style>
  </head>
  <body class="bg-light">
    <!-- Navbar placeholder -->
    <div id="navbar"></div>

    <!-- Toast -->
    <div
      class="toast-container position-fixed top-0 end-0 p-3"
      style="z-index: 9999"
    >
      <div
        id="liveToast"
        class="toast align-items-center text-bg-success border-0"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body d-flex align-items-center gap-2">
            <i id="toastIcon" class="bi bi-check-circle-fill fs-5"></i>
            <span id="toastMessage">Action completed!</span>
          </div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
            aria-label="Close"
          ></button>
        </div>
      </div>
    </div>

    <main class="container py-5">
      <!-- Page Header -->
      <div class="d-flex align-items-center gap-3 my-4">
        <a href="./home.html" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-arrow-left me-1"></i>Back
        </a>
        <div>
          <h4 class="fw-bold mb-0 pt-2" id="pageTitle">All Categories</h4>
          <p class="text-muted small mb-0" id="productCount"></p>
        </div>
      </div>

      <div class="row g-4">
        <!-- ── Sidebar Filter ── -->
        <div class="col-12 col-md-3">
          <div class="card border-0 shadow-sm sticky-top" style="top: 80px">
            <div
              class="card-header bg-white border-bottom fw-semibold d-flex align-items-center gap-2"
            >
              <i class="bi bi-funnel-fill text-primary"></i> Filter by Category
            </div>
            <div class="card-body p-0">
              <!-- "All" option -->
              <div class="list-group list-group-flush" id="categoryList">
                <button
                  class="list-group-item list-group-item-action d-flex align-items-center gap-2 active"
                  data-cat-id=""
                  data-cat-name="All Products"
                  onclick="selectCategory(this)"
                >
                  <i class="bi bi-grid-3x3-gap-fill small"></i>
                  <span>All Products</span>
                </button>
              </div>
              <!-- Skeleton for categories -->
              <div id="catSkeleton" class="px-3 py-2">
                <script>
                  document.write(
                    Array(6)
                      .fill(0)
                      .map(
                        () =>
                          `<div class="placeholder-glow mb-2">
                        <span class="placeholder col-10 bg-secondary rounded" style="height:18px;display:block;"></span>
                      </div>`,
                      )
                      .join(""),
                  );
                </script>
              </div>
            </div>
            <!-- Active filter badge -->
            <div
              class="card-footer bg-white border-top text-center d-none"
              id="clearFilterWrap"
            >
              <button
                class="btn btn-sm btn-outline-secondary w-100"
                onclick="
                  selectCategory(document.querySelector('[data-cat-id=\'\']'))
                "
              >
                <i class="bi bi-x-circle me-1"></i>Clear Filter
              </button>
            </div>
          </div>
        </div>

        <!-- ── Products Area ── -->
        <div class="col-12 col-md-9">
          <!-- Skeleton Loader -->
          <div
            id="skeletonLoader"
            class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4"
          >
            <script>
              document.write(
                Array(6)
                  .fill(0)
                  .map(
                    () => `
                  <div class="col">
                    <div class="card h-100 border-0 shadow-sm">
                      <div class="placeholder-glow">
                        <div class="placeholder bg-secondary" style="height:220px;width:100%;border-radius:.375rem .375rem 0 0;"></div>
                      </div>
                      <div class="card-body placeholder-glow">
                        <h6 class="placeholder col-8 bg-secondary"></h6>
                        <p class="placeholder col-5 bg-secondary"></p>
                        <p class="placeholder col-4 bg-secondary"></p>
                      </div>
                      <div class="card-footer border-0 placeholder-glow">
                        <div class="placeholder col-12 bg-secondary" style="height:38px;border-radius:.375rem;"></div>
                      </div>
                    </div>
                  </div>
                `,
                  )
                  .join(""),
              );
            </script>
          </div>

          <!-- Products Grid -->
          <div
            id="productsGrid"
            class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4 d-none"
          ></div>

          <!-- Empty state -->
          <div id="emptyState" class="text-center py-5 d-none">
            <i class="bi bi-box-seam display-3 text-muted"></i>
            <p class="text-muted mt-3">No products found in this category.</p>
          </div>

          <!-- Error Alert -->
          <div
            id="errorAlert"
            class="alert alert-danger d-none text-center"
            role="alert"
          >
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Failed to load products. Please try again later.
          </div>

          <!-- Pagination -->
          <nav
            aria-label="Products pagination"
            class="mt-5 d-none"
            id="paginationNav"
          >
            <ul
              class="pagination justify-content-center flex-wrap gap-1"
              id="paginationList"
            ></ul>
          </nav>
        </div>
      </div>
    </main>

    <!-- Footer placeholder -->
    <div id="footer"></div>
    <script src="./components/navbar.js"></script>

    <script>
      // Config
      const API_BASE = "https://ecommerce.routemisr.com/api/v1";
      const ITEMS_PER_PAGE = 6;

      let allProducts = [];
      let filteredProd = [];
      let currentPage = 1;
      let wishlistIds = new Set();
      let activeCatId = "";

      //Toast
      function showToast(message, type = "success") {
        const toastEl = document.getElementById("liveToast");
        const toastMsg = document.getElementById("toastMessage");
        const toastIcon = document.getElementById("toastIcon");
        toastEl.className = "toast align-items-center border-0";
        const map = {
          success: ["text-bg-success", "bi bi-check-circle-fill fs-5"],
          danger: ["text-bg-danger", "bi bi-x-circle-fill fs-5"],
          warning: ["text-bg-warning", "bi bi-exclamation-circle-fill fs-5"],
          info: ["text-bg-info", "bi bi-info-circle-fill fs-5"],
        };
        const [cls, icon] = map[type] || map.info;
        toastEl.classList.add(cls);
        toastIcon.className = icon;
        toastMsg.textContent = message;
        bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 3000 }).show();
      }

      //  Add to Cart
      async function addToCart(productId, btn) {
        btn.disabled = true;
        btn.innerHTML =
          '<span class="spinner-border spinner-border-sm me-1"></span>Adding...';
        try {
          const token = localStorage.getItem("token") || "";
          const res = await fetch(`${API_BASE}/cart`, {
            method: "POST",
            headers: { "Content-Type": "application/json", token },
            body: JSON.stringify({ productId }),
          });
          const data = await res.json();

          if (res.ok) {
            showToast("Product added to cart!", "success");
            if (typeof updateCartBadge === "function") updateCartBadge();
          } else {
            showToast(data.message || "Could not add to cart.", "danger");
          }
        } catch {
          showToast("Network error. Please try again.", "danger");
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-cart-plus me-1"></i>Add to Cart';
        }
      }

      //  Toggle Wishlist
      async function toggleWishlist(productId, btn) {
        const isWishlisted = wishlistIds.has(productId);
        btn.disabled = true;
        try {
          const token = localStorage.getItem("token") || "";
          let res, data;
          if (isWishlisted) {
            res = await fetch(`${API_BASE}/wishlist/${productId}`, {
              method: "DELETE",
              headers: { token },
            });
            data = await res.json();
            if (res.ok) {
              wishlistIds.delete(productId);
              btn.innerHTML = '<i class="bi bi-heart"></i>';
              btn.classList.replace("btn-danger", "btn-outline-danger");
              showToast("Removed from wishlist.", "warning");
              if (typeof updateWishlistBadge === "function")
                updateWishlistBadge();
            }
          } else {
            res = await fetch(`${API_BASE}/wishlist`, {
              method: "POST",
              headers: { "Content-Type": "application/json", token },
              body: JSON.stringify({ productId }),
            });
            data = await res.json();
            if (res.ok) {
              wishlistIds.add(productId);
              btn.innerHTML = '<i class="bi bi-heart-fill"></i>';
              btn.classList.replace("btn-outline-danger", "btn-danger");
              showToast("Added to wishlist!", "success");
              if (typeof updateWishlistBadge === "function")
                updateWishlistBadge();
            }
          }
          if (!res.ok)
            showToast(data.message || "Could not update wishlist.", "danger");
        } catch {
          showToast("Network error. Please try again.", "danger");
        } finally {
          btn.disabled = false;
        }
      }

      //  Render Products
      function renderProducts(products) {
        const grid = document.getElementById("productsGrid");
        const empty = document.getElementById("emptyState");
        grid.innerHTML = "";

        if (!products.length) {
          grid.classList.add("d-none");
          empty.classList.remove("d-none");
          document.getElementById("paginationNav").classList.add("d-none");
          return;
        }

        empty.classList.add("d-none");
        grid.classList.remove("d-none");

        products.forEach((product) => {
          const wishlisted = wishlistIds.has(product._id);
          const stars = Math.round(product.ratingsAverage || 0);
          const starsHtml = Array(5)
            .fill(0)
            .map(
              (_, i) =>
                `<i class="bi bi-star${i < stars ? "-fill" : ""} text-warning small"></i>`,
            )
            .join("");

          const col = document.createElement("div");
          col.className = "col";
          col.innerHTML = `
            <div class="card h-100 border-0 shadow-sm position-relative overflow-hidden">

              <!-- Wishlist -->
              <button
                class="btn btn-sm ${wishlisted ? "btn-danger" : "btn-outline-danger"} position-absolute top-0 end-0 m-2 rounded-circle d-flex align-items-center justify-content-center"
                style="width:36px;height:36px;z-index:2;"
                onclick="toggleWishlist('${product._id}', this)"
                title="${wishlisted ? "Remove from Wishlist" : "Add to Wishlist"}"
              >
                <i class="bi bi-heart${wishlisted ? "-fill" : ""}"></i>
              </button>

              <!-- Sale badge -->
              ${
                product.priceAfterDiscount
                  ? `<span class="badge bg-danger position-absolute top-0 start-0 m-2" style="z-index:2;">Sale</span>`
                  : ""
              }

              <!-- Image -->
                <a href="./productDetails.html?id=${product._id}" class="text-decoration-none">
              <div class="ratio ratio-4x3 bg-white">
                <img
                  src="${product.imageCover}"
                  class="card-img-top object-fit-contain p-2"
                  alt="${product.title}"
                  loading="lazy"
                  onerror="this.src='https://placehold.co/300x300?text=No+Image'"
                />
              </div>
              </a>

              <!-- Body -->
              <div class="card-body pb-1">
                <span class="badge bg-primary bg-opacity-10 text-primary small mb-1">${product.category?.name || ""}</span>
                <h6 class="card-title fw-semibold lh-sm mb-1" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
                  ${product.title}
                </h6>
                <div class="d-flex align-items-center gap-1 mb-2">
                  ${starsHtml}
                  <span class="text-muted small ms-1">(${product.ratingsQuantity || 0})</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                  <span class="fw-bold text-success fs-6">${product.priceAfterDiscount || product.price} EGP</span>
                  ${
                    product.priceAfterDiscount
                      ? `<span class="text-decoration-line-through text-muted small">${product.price} EGP</span>`
                      : ""
                  }
                </div>
              </div>

              <!-- Footer -->
              <div class="card-footer bg-transparent border-0 pt-0 pb-3 px-3">
                <button
                  class="btn btn-dark w-100 btn-sm"
                  onclick="addToCart('${product._id}', this)"
                >
                  <i class="bi bi-cart-plus me-1"></i>Add to Cart
                </button>
              </div>

            </div>`;
          grid.appendChild(col);
        });
      }

      //  Pagination
      function renderPagination(total, perPage, current) {
        const totalPages = Math.ceil(total / perPage);
        const nav = document.getElementById("paginationNav");
        const list = document.getElementById("paginationList");
        list.innerHTML = "";

        if (totalPages <= 1) {
          nav.classList.add("d-none");
          return;
        }
        nav.classList.remove("d-none");

        const prevLi = document.createElement("li");
        prevLi.className = `page-item ${current === 1 ? "disabled" : ""}`;
        prevLi.innerHTML = `<a class="page-link" href="#"><i class="bi bi-chevron-left"></i></a>`;
        prevLi.addEventListener("click", (e) => {
          e.preventDefault();
          if (current > 1) goToPage(current - 1);
        });
        list.appendChild(prevLi);

        let pages =
          totalPages <= 7
            ? Array.from({ length: totalPages }, (_, i) => i + 1)
            : [
                1,
                ...(current > 3 ? ["..."] : []),
                ...Array.from(
                  { length: 3 },
                  (_, i) => Math.max(2, current - 1) + i,
                ).filter((p) => p > 1 && p < totalPages),
                ...(current < totalPages - 2 ? ["..."] : []),
                totalPages,
              ];

        pages = [...new Set(pages)];

        pages.forEach((p) => {
          const li = document.createElement("li");
          if (p === "...") {
            li.className = "page-item disabled";
            li.innerHTML = `<span class="page-link">…</span>`;
          } else {
            li.className = `page-item ${p === current ? "active" : ""}`;
            li.innerHTML = `<a class="page-link" href="#">${p}</a>`;
            li.addEventListener("click", (e) => {
              e.preventDefault();
              goToPage(p);
            });
          }
          list.appendChild(li);
        });

        const nextLi = document.createElement("li");
        nextLi.className = `page-item ${current === totalPages ? "disabled" : ""}`;
        nextLi.innerHTML = `<a class="page-link" href="#"><i class="bi bi-chevron-right"></i></a>`;
        nextLi.addEventListener("click", (e) => {
          e.preventDefault();
          if (current < totalPages) goToPage(current + 1);
        });
        list.appendChild(nextLi);
      }

      function goToPage(page) {
        currentPage = page;
        const start = (page - 1) * ITEMS_PER_PAGE;
        renderProducts(filteredProd.slice(start, start + ITEMS_PER_PAGE));
        renderPagination(filteredProd.length, ITEMS_PER_PAGE, page);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      //  Apply category filter
      function applyFilter(catId) {
        activeCatId = catId;
        filteredProd = catId
          ? allProducts.filter((p) => p.category?._id === catId)
          : [...allProducts];

        currentPage = 1;
        document.getElementById("productCount").textContent =
          `${filteredProd.length} product${filteredProd.length !== 1 ? "s" : ""}`;

        goToPage(1);

        // show/hide clear button
        document
          .getElementById("clearFilterWrap")
          .classList.toggle("d-none", !catId);
      }

      function selectCategory(btn) {
        // Deactivate all
        document
          .querySelectorAll("#categoryList .list-group-item")
          .forEach((b) => {
            b.classList.remove("active");
          });
        btn.classList.add("active");

        const catId = btn.dataset.catId;
        const catName = btn.dataset.catName;

        // Update URL (without reload)
        const url = new URL(window.location);
        if (catId) {
          url.searchParams.set("id", catId);
          url.searchParams.set("name", catName);
        } else {
          url.searchParams.delete("id");
          url.searchParams.delete("name");
        }
        history.replaceState(null, "", url);

        // Update page title
        document.getElementById("pageTitle").textContent =
          catName || "All Categories";
        document.title = catName || "Categories";

        applyFilter(catId);
      }

      //  Build sidebar from categories API
      async function loadCategories(preselectedId) {
        try {
          const res = await fetch(`${API_BASE}/categories`);
          const data = await res.json();
          document.getElementById("catSkeleton").remove();
          const list = document.getElementById("categoryList");

          data.data.forEach((cat) => {
            const btn = document.createElement("button");
            btn.className =
              "list-group-item list-group-item-action d-flex align-items-center gap-2";
            btn.dataset.catId = cat._id;
            btn.dataset.catName = cat.name;
            btn.innerHTML = `<i class="bi bi-tag small"></i><span>${cat.name}</span>`;
            btn.addEventListener("click", () => selectCategory(btn));

            // Pre-select if coming from URL
            if (cat._id === preselectedId) {
              // deactivate "All"
              list.querySelector('[data-cat-id=""]').classList.remove("active");
              btn.classList.add("active");
              document
                .getElementById("clearFilterWrap")
                .classList.remove("d-none");
            }

            list.appendChild(btn);
          });
        } catch {
          document.getElementById("catSkeleton").innerHTML =
            '<p class="text-danger small px-3 py-2">Could not load categories.</p>';
        }
      }

      //  Fetch Wishlist
      async function fetchWishlist() {
        const token = localStorage.getItem("token");
        if (!token) return;
        try {
          const res = await fetch(`${API_BASE}/wishlist`, {
            headers: { token },
          });
          const data = await res.json();
          if (res.ok && Array.isArray(data.data)) {
            data.data.forEach((item) => {
              const id = item._id || item.id || item;
              if (id) wishlistIds.add(String(id));
            });
          }
        } catch {
          /* silent */
        }
      }

      //  Fetch all products
      async function fetchProducts(preselectedId) {
        try {
          const res = await fetch(`${API_BASE}/products?limit=500`);
          const data = await res.json();
          if (!res.ok || !data.data) throw new Error("Bad response");

          allProducts = data.data;
          document.getElementById("skeletonLoader").classList.add("d-none");
          document.getElementById("productsGrid").classList.remove("d-none");

          applyFilter(preselectedId);
        } catch {
          document.getElementById("skeletonLoader").classList.add("d-none");
          document.getElementById("errorAlert").classList.remove("d-none");
        }
      }

      //  Init
      const params = new URLSearchParams(window.location.search);
      const urlCatId = params.get("id") || "";
      const urlCatName = params.get("name") || "";

      // Set initial title
      if (urlCatName) {
        document.getElementById("pageTitle").textContent = urlCatName;
        document.title = urlCatName;
      }

      function loadComponent(id, file, callback) {
        // ← add callback param
        fetch(file)
          .then((response) => response.text())
          .then((data) => {
            document.getElementById(id).innerHTML = data;
            if (typeof callback === "function") callback();
          });
      }

      loadComponent("navbar", "/components/navbar.html", initNavbar);
      loadComponent("footer", "/components/footer.html");

      // Boot: wishlist → categories → products (in parallel where safe)
      fetchWishlist().then(() => {
        loadCategories(urlCatId);
        fetchProducts(urlCatId);
      });
    </script>
  </body>
</html>
