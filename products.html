<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <style>
      .navbar-brand img {
        max-width: 150px;
        width: 100%;
      }
    </style>
  </head>
  <body class="bg-light">
    <!-- Navbar placeholder -->
    <div id="navbar"></div>

    <!-- Toast-->
    <div
      class="toast-container position-fixed top-0 end-0 p-3"
      style="z-index: 9999"
    >
      <div
        id="liveToast"
        class="toast align-items-center text-bg-success border-0"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body d-flex align-items-center gap-2">
            <i id="toastIcon" class="bi bi-check-circle-fill fs-5"></i>
            <span id="toastMessage">Action completed!</span>
          </div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
            aria-label="Close"
          ></button>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <main class="container py-5">
      <!-- Header -->
      <div class="row my-4">
        <div class="col">
          <h2 class="fw-bold">All Products</h2>
          <p class="text-muted mb-0">Browse our collection</p>
        </div>
        <div class="col-auto d-flex align-items-center gap-3">
          <span class="badge bg-primary rounded-pill fs-6" id="productCount"
            >Loading...</span
          >
        </div>
      </div>

      <!-- Skeleton Loader -->
      <div
        id="skeletonLoader"
        class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"
      >
        <!-- 8 skeleton cards -->
        <script>
          document.write(
            Array(8)
              .fill(0)
              .map(
                () => `
            <div class="col">
              <div class="card h-100 border-0 shadow-sm">
                <div class="placeholder-glow">
                  <div class="placeholder bg-secondary" style="height:220px;width:100%;border-radius:.375rem .375rem 0 0;"></div>
                </div>
                <div class="card-body placeholder-glow">
                  <h6 class="placeholder col-8 bg-secondary"></h6>
                  <p class="placeholder col-5 bg-secondary"></p>
                  <p class="placeholder col-4 bg-secondary"></p>
                </div>
                <div class="card-footer border-0 placeholder-glow">
                  <div class="placeholder col-12 bg-secondary" style="height:38px;border-radius:.375rem;"></div>
                </div>
              </div>
            </div>
          `,
              )
              .join(""),
          );
        </script>
      </div>

      <!-- Products Grid -->
      <div
        id="productsGrid"
        class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 d-none"
      ></div>

      <!-- Error Alert -->
      <div
        id="errorAlert"
        class="alert alert-danger d-none text-center"
        role="alert"
      >
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        Failed to load products. Please try again later.
      </div>

      <!-- Pagination -->
      <nav
        aria-label="Products pagination"
        class="mt-5 d-none"
        id="paginationNav"
      >
        <ul
          class="pagination justify-content-center flex-wrap gap-1"
          id="paginationList"
        ></ul>
      </nav>
    </main>

    <!-- Footer placeholder -->
    <div id="footer"></div>
    <script src="/components/navbar.js"></script>

    <script>
      //config
      const API_BASE = "https://ecommerce.routemisr.com/api/v1";
      const ITEMS_PER_PAGE = 8;
      let currentPage = 1;
      let allProducts = [];
      let wishlistIds = new Set();

      // Toast helper
      function showToast(message, type = "success") {
        const toastEl = document.getElementById("liveToast");
        const toastMsg = document.getElementById("toastMessage");
        const toastIcon = document.getElementById("toastIcon");

        // Reset classes
        toastEl.className = "toast align-items-center border-0";

        if (type === "success") {
          toastEl.classList.add("text-bg-success");
          toastIcon.className = "bi bi-check-circle-fill fs-5";
        } else if (type === "danger") {
          toastEl.classList.add("text-bg-danger");
          toastIcon.className = "bi bi-x-circle-fill fs-5";
        } else if (type === "warning") {
          toastEl.classList.add("text-bg-warning");
          toastIcon.className = "bi bi-exclamation-circle-fill fs-5";
        } else {
          toastEl.classList.add("text-bg-info");
          toastIcon.className = "bi bi-info-circle-fill fs-5";
        }

        toastMsg.textContent = message;
        const toast = bootstrap.Toast.getOrCreateInstance(toastEl, {
          delay: 3000,
        });
        toast.show();
      }

      // Add to Cart
      async function addToCart(productId, btn) {
        btn.disabled = true;
        btn.innerHTML =
          '<span class="spinner-border spinner-border-sm me-1"></span> Adding...';

        try {
          const res = await fetch(`${API_BASE}/cart`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              token: localStorage.token,
            },
            body: JSON.stringify({ productId }),
          });
          const data = await res.json();

          if (res.ok) {
            showToast("✓ Product added to cart!", "success");
            if (typeof updateCartBadge === 'function') updateCartBadge();
          } else {
            showToast(data.message || "Could not add to cart.", "danger");
          }
        } catch {
          showToast("Network error. Please try again.", "danger");
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-cart-plus me-1"></i> Add to Cart';
        }
      }

      //  Toggle Wishlist
      async function toggleWishlist(productId, btn) {
        const isWishlisted = wishlistIds.has(productId);
        btn.disabled = true;

        try {
          let res, data;
          const token = localStorage.getItem("token") || "";
          if (isWishlisted) {
            res = await fetch(`${API_BASE}/wishlist/${productId}`, {
              method: "DELETE",
              headers: { token },
            });
            data = await res.json();
            if (res.ok) {
              wishlistIds.delete(productId);
              btn.innerHTML = '<i class="bi bi-heart"></i>';
              btn.classList.remove("btn-danger");
              btn.classList.add("btn-outline-danger");
              showToast("Removed from wishlist.", "warning");
              if (typeof updateWishlistBadge === 'function') updateWishlistBadge();

            }
          } else {
            res = await fetch(`${API_BASE}/wishlist`, {
              method: "POST",
              headers: { "Content-Type": "application/json", token },
              body: JSON.stringify({ productId }),
            });
            data = await res.json();
            if (res.ok) {
              wishlistIds.add(productId);
              btn.innerHTML = '<i class="bi bi-heart-fill"></i>';
              btn.classList.remove("btn-outline-danger");
              btn.classList.add("btn-danger");
              showToast("Added to wishlist!", "success");
              if (typeof updateWishlistBadge === 'function') updateWishlistBadge();

            }
          }
          if (!res.ok)
            showToast(data.message || "Could not update wishlist.", "danger");
        } catch {
          showToast("Network error. Please try again.", "danger");
        } finally {
          btn.disabled = false;
        }
      }

      //  Render Products
      function renderProducts(products) {
        const grid = document.getElementById("productsGrid");
        grid.innerHTML = "";

        products.forEach((product) => {
          const wishlisted = wishlistIds.has(product._id);
          const stars = Math.round(product.ratingsAverage || 0);
          const starsHtml = Array(5)
            .fill(0)
            .map(
              (_, i) =>
                `<i class="bi bi-star${i < stars ? "-fill" : ""} text-warning small"></i>`,
            )
            .join("");

          const col = document.createElement("div");
          col.className = "col";
          col.innerHTML = `
            <div class="card h-100 border-0 shadow-sm position-relative overflow-hidden">

              <!-- Wishlist Button -->
              <button
                class="btn btn-sm ${wishlisted ? "btn-danger" : "btn-outline-danger"} position-absolute top-0 end-0 m-2 rounded-circle d-flex align-items-center justify-content-center"
                style="width:36px;height:36px;z-index:2;"
                onclick="toggleWishlist('${product._id}', this)"
                title="${wishlisted ? "Remove from Wishlist" : "Add to Wishlist"}"
              >
                <i class="bi bi-heart${wishlisted ? "-fill" : ""}"></i>
              </button>

              <!-- Badge -->
              ${
                product.priceAfterDiscount
                  ? `
                <span class="badge bg-danger position-absolute top-0 start-0 m-2" style="z-index:2;">Sale</span>
              `
                  : ""
              }

              <!-- Image -->
                <a href="/productDetails.html?id=${product._id}" class="text-decoration-none">
                <div class="ratio ratio-4x3 bg-white">
                  <img
                    src="${product.imageCover}"
                    class="card-img-top object-fit-contain p-2"
                    alt="${product.title}"
                    loading="lazy"
                    onerror="this.src='https://placehold.co/300x300?text=No+Image'"
                  />
                </div>
              </a>
              <!-- Body -->
              <div class="card-body pb-1">
                <span class="badge bg-primary bg-opacity-10 text-primary small mb-1">${product.category?.name || ""}</span>
                <h6 class="card-title fw-semibold lh-sm mb-1" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
                  ${product.title}
                </h6>
                <div class="d-flex align-items-center gap-1 mb-2">
                  ${starsHtml}
                  <span class="text-muted small ms-1">(${product.ratingsQuantity || 0})</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                  <span class="fw-bold text-success fs-6">${product.priceAfterDiscount || product.price} EGP</span>
                  ${product.priceAfterDiscount ? `<span class="text-decoration-line-through text-muted small">${product.price} EGP</span>` : ""}
                 </div>
              </div>

              <!-- Footer -->
              <div class="card-footer bg-transparent border-0 pt-0 pb-3 px-3">
                <button
                  class="btn btn-dark w-100 btn-sm"
                  onclick="addToCart('${product._id}', this)"
                >
                  <i class="bi bi-cart-plus me-1"></i> Add to Cart
                </button>
                
              </div>

            </div>
          `;
          grid.appendChild(col);
        });
      }

      //  Render Pagination
      function renderPagination(total, perPage, current) {
        const totalPages = Math.ceil(total / perPage);
        const list = document.getElementById("paginationList");
        list.innerHTML = "";

        const nav = document.getElementById("paginationNav");
        if (totalPages <= 1) {
          nav.classList.add("d-none");
          return;
        }
        nav.classList.remove("d-none");

        // Prev
        const prevLi = document.createElement("li");
        prevLi.className = `page-item ${current === 1 ? "disabled" : ""}`;
        prevLi.innerHTML = `<a class="page-link" href="#" aria-label="Previous"><i class="bi bi-chevron-left"></i></a>`;
        prevLi.addEventListener("click", (e) => {
          e.preventDefault();
          if (current > 1) goToPage(current - 1);
        });
        list.appendChild(prevLi);

        // Pages with ellipsis
        let pages = [];
        if (totalPages <= 7) {
          pages = Array.from({ length: totalPages }, (_, i) => i + 1);
        } else {
          pages = [1];
          if (current > 3) pages.push("...");
          for (
            let i = Math.max(2, current - 1);
            i <= Math.min(totalPages - 1, current + 1);
            i++
          )
            pages.push(i);
          if (current < totalPages - 2) pages.push("...");
          pages.push(totalPages);
        }

        pages.forEach((p) => {
          const li = document.createElement("li");
          if (p === "...") {
            li.className = "page-item disabled";
            li.innerHTML = `<span class="page-link">…</span>`;
          } else {
            li.className = `page-item ${p === current ? "active" : ""}`;
            li.innerHTML = `<a class="page-link" href="#">${p}</a>`;
            li.addEventListener("click", (e) => {
              e.preventDefault();
              goToPage(p);
            });
          }
          list.appendChild(li);
        });

        // Next
        const nextLi = document.createElement("li");
        nextLi.className = `page-item ${current === totalPages ? "disabled" : ""}`;
        nextLi.innerHTML = `<a class="page-link" href="#" aria-label="Next"><i class="bi bi-chevron-right"></i></a>`;
        nextLi.addEventListener("click", (e) => {
          e.preventDefault();
          if (current < totalPages) goToPage(current + 1);
        });
        list.appendChild(nextLi);
      }

      // Go To Page
      function goToPage(page) {
        currentPage = page;
        const start = (page - 1) * ITEMS_PER_PAGE;
        const slice = allProducts.slice(start, start + ITEMS_PER_PAGE);
        renderProducts(slice);
        renderPagination(allProducts.length, ITEMS_PER_PAGE, page);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
      // Fetch Wishlist (pre-load user's saved items)
      async function fetchWishlist() {
        const token = localStorage.getItem("token");
        if (!token) return; //

        try {
          const res = await fetch(`${API_BASE}/wishlist`, {
            headers: { token },
          });
          const data = await res.json();

          if (res.ok && Array.isArray(data.data)) {
            // API returns array of product objects; grab their IDs
            data.data.forEach((item) => {
              const id = item._id || item.id || item;
              if (id) wishlistIds.add(String(id));
            });
          }
        } catch {}
      }

      // Fetch Products
      async function fetchProducts() {
        try {
          const res = await fetch(`${API_BASE}/products?limit=100`);
          const data = await res.json();

          if (!res.ok || !data.data) throw new Error("Bad response");

          allProducts = data.data;
          document.getElementById("productCount").textContent =
            `${allProducts.length} Products`;
          document.getElementById("skeletonLoader").classList.add("d-none");
          document.getElementById("productsGrid").classList.remove("d-none");

          goToPage(1);
        } catch (err) {
          document.getElementById("skeletonLoader").classList.add("d-none");
          document.getElementById("errorAlert").classList.remove("d-none");
          console.error(err);
        }
      }

      //  Load components & init
      function loadComponent(id, file, callback) {
        // ← add callback param
        fetch(file)
          .then((response) => response.text())
          .then((data) => {
            document.getElementById(id).innerHTML = data;
            if (typeof callback === "function") callback();
          });
      }

      loadComponent("navbar", "/components/navbar.html", initNavbar);
      loadComponent("footer", "/components/footer.html");
      fetchWishlist().then(() => fetchProducts());
    </script>
  </body>
</html>
